name: 'a-test Browser CUA'
description: 'Run a-test CUA tests in headless Chrome. Secrets (AZURE_CUA_API_KEY, AZURE_CUA_BASE_URL) must be set in the calling job env.'

inputs:
  case:
    description: 'Path to test case file (.yaml or .json)'
    required: true
  output-dir:
    description: 'Directory for screenshots, demo.gif, result.json'
    default: '/tmp/a-test-output'
  url:
    description: 'Starting URL (overrides the url field in the test case)'
    default: ''
  model:
    description: 'Azure OpenAI model deployment name'
    default: 'gpt-5.4'

runs:
  using: composite
  steps:
    - name: Resolve a-test source (local vs. remote invocation)
      id: source
      shell: bash
      env:
        # github.action_repository / github.action_ref are ONLY populated
        # when this action is referenced remotely, e.g.
        # `uses: dzianisv/a-test/.github/actions/a-test-browser@v1`
        # from a downstream consumer's own workflow (GitHub Actions docs:
        # "the owner and repository name of the action" / "the ref of the
        # action being executed"). For a LOCAL reference
        # (`uses: ./.github/actions/a-test-browser`, used by this repo's
        # own cua-*.yml workflows), there is no separate action repo to name,
        # so both are empty strings. Per GitHub's own guidance ("Do not use
        # [action_ref/action_repository] in the run keyword. To make this
        # context work with composite actions, reference it within the env
        # context..."), they are captured here via `env:` rather than
        # interpolated directly into a `run:` script body.
        ACTION_REPOSITORY: ${{ github.action_repository }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        if [ -n "$ACTION_REPOSITORY" ]; then
          # Remote consumer: this action's own code was fetched from
          # $ACTION_REPOSITORY@$ACTION_REF, so fetch the matching browser
          # runner + Python package source from that SAME repo+ref into a
          # dedicated _a-test checkout -- keeping everything pinned in
          # lockstep with whatever version of this action the consumer
          # chose, instead of silently drifting to dzianisv/a-test's default
          # branch regardless of pinning.
          echo "mode=remote" >> "$GITHUB_OUTPUT"
          echo "py-dir=${GITHUB_WORKSPACE}/_a-test" >> "$GITHUB_OUTPUT"
          echo "browser-dir=${GITHUB_WORKSPACE}/_a-test/browser" >> "$GITHUB_OUTPUT"
        else
          # Local invocation: the calling workflow's own `actions/checkout`
          # step already placed the exact revision under test (this IS the
          # a-test repo -- a_test/pyproject.toml/browser/ all live at the
          # workspace root) -- reuse it directly instead of re-fetching a
          # second, potentially-stale copy of the remote default branch.
          echo "mode=local" >> "$GITHUB_OUTPUT"
          echo "py-dir=${GITHUB_WORKSPACE}" >> "$GITHUB_OUTPUT"
          echo "browser-dir=${GITHUB_WORKSPACE}/browser" >> "$GITHUB_OUTPUT"
        fi
        echo "repository=${ACTION_REPOSITORY:-dzianisv/a-test}" >> "$GITHUB_OUTPUT"
        echo "ref=${ACTION_REF:-main}" >> "$GITHUB_OUTPUT"

    - name: Checkout a-test browser runner (remote consumers only)
      if: steps.source.outputs.mode == 'remote'
      uses: actions/checkout@v4
      with:
        repository: ${{ steps.source.outputs.repository }}
        ref: ${{ steps.source.outputs.ref }}
        path: _a-test
        sparse-checkout: |
          browser
          a_test
          pyproject.toml
          README.md
          LICENSE

    - name: Install a-test
      shell: bash
      env:
        A_TEST_PY_DIR: ${{ steps.source.outputs.py-dir }}
      run: pip install "$A_TEST_PY_DIR"

    - name: Install bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install browser runner deps
      shell: bash
      env:
        A_TEST_BROWSER_DIR: ${{ steps.source.outputs.browser-dir }}
      run: cd "$A_TEST_BROWSER_DIR" && bun install

    - name: Install system deps
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb xdotool scrot ffmpeg
        google-chrome --version

    - name: Start Xvfb
      shell: bash
      run: |
        Xvfb :99 -screen 0 1920x1080x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    - name: Run CUA test in Chrome
      shell: bash
      env:
        A_TEST_BROWSER_DIR: ${{ steps.source.outputs.browser-dir }}
        CUA_MODEL: ${{ inputs.model }}
        DISPLAY: ':99'
      run: |
        URL_ARG=""
        if [ -n "${{ inputs.url }}" ]; then
          URL_ARG="--url ${{ inputs.url }}"
        fi
        a-test run \
          --target browser \
          --case ${{ inputs.case }} \
          --output-dir ${{ inputs.output-dir }} \
          $URL_ARG
