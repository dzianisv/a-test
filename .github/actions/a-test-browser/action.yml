name: 'a-test Browser CUA'
description: 'Run a-test CUA tests in headless Chrome. Secrets (AZURE_CUA_API_KEY, AZURE_CUA_BASE_URL) must be set in the calling job env.'

inputs:
  case:
    description: 'Path to test case file (.yaml or .json)'
    required: true
  output-dir:
    description: 'Directory for screenshots, demo.gif, result.json'
    default: '/tmp/a-test-output'
  url:
    description: 'Starting URL (overrides the url field in the test case)'
    default: ''
  model:
    description: 'Azure OpenAI model deployment name'
    default: 'gpt-5.4'

runs:
  using: composite
  steps:
    - name: Install a-test
      shell: bash
      run: pip install a-test

    - name: Checkout a-test browser runner
      uses: actions/checkout@v4
      with:
        repository: dzianisv/a-test
        path: _a-test
        sparse-checkout: browser

    - name: Install bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install browser runner deps
      shell: bash
      run: cd _a-test/browser && bun install

    - name: Install system deps
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb xdotool scrot ffmpeg
        google-chrome --version

    - name: Start Xvfb
      shell: bash
      run: |
        Xvfb :99 -screen 0 1920x1080x24 &
        echo "DISPLAY=:99" >> $GITHUB_ENV

    - name: Run CUA test in Chrome
      shell: bash
      env:
        A_TEST_BROWSER_DIR: ${{ github.action_path }}/../../_a-test/browser
        CUA_MODEL: ${{ inputs.model }}
        DISPLAY: ':99'
      run: |
        URL_ARG=""
        if [ -n "${{ inputs.url }}" ]; then
          URL_ARG="--url ${{ inputs.url }}"
        fi
        a-test run \
          --target browser \
          --case ${{ inputs.case }} \
          --output-dir ${{ inputs.output-dir }} \
          $URL_ARG
