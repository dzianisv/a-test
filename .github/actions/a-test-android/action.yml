name: 'a-test Android CUA'
description: 'Run a-test CUA tests on an Android emulator. Secrets (AZURE_CUA_API_KEY, AZURE_CUA_BASE_URL) must be set in the calling job env.'

inputs:
  case:
    description: 'Path to test case file (.yaml, .py, or .json)'
    required: true
  api-level:
    description: 'Android emulator API level'
    default: '33'
  profile:
    description: 'Optional android-emulator-runner device profile (e.g. pixel_4). Leave empty to let reactivecircus/android-emulator-runner pick its own default.'
    default: ''
  apk-path:
    description: 'Optional path to an APK to install before the test'
    default: ''
  output-dir:
    description: 'Directory for screenshots, demo.gif, result.json'
    default: '/tmp/a-test-output'
  model:
    description: 'Azure OpenAI model deployment name'
    default: 'gpt-5.4'

runs:
  using: composite
  steps:
    - name: Resolve a-test Python source (local vs. remote invocation)
      id: source
      shell: bash
      env:
        # github.action_repository / github.action_ref are ONLY populated
        # when this action is referenced remotely, e.g.
        # `uses: dzianisv/a-test/.github/actions/a-test-android@v1`
        # from a downstream consumer's own workflow (GitHub Actions docs:
        # "the owner and repository name of the action" / "the ref of the
        # action being executed"). For a LOCAL reference
        # (`uses: ./.github/actions/a-test-android`, used by this repo's
        # own cua-*.yml workflows), there is no separate action repo to name,
        # so both are empty strings. Per GitHub's own guidance ("Do not use
        # [action_ref/action_repository] in the run keyword. To make this
        # context work with composite actions, reference it within the env
        # context..."), they are captured here via `env:` rather than
        # interpolated directly into a `run:` script body.
        ACTION_REPOSITORY: ${{ github.action_repository }}
        ACTION_REF: ${{ github.action_ref }}
      run: |
        if [ -n "$ACTION_REPOSITORY" ]; then
          # Remote consumer: this action's own code was fetched from
          # $ACTION_REPOSITORY@$ACTION_REF, so fetch the matching Python
          # package source (a_test/, pyproject.toml) from that SAME repo+ref
          # into a dedicated _a-test checkout -- keeping the installed
          # package pinned in lockstep with whatever version of this action
          # the consumer chose, instead of silently drifting to
          # dzianisv/a-test's default branch regardless of pinning.
          echo "mode=remote" >> "$GITHUB_OUTPUT"
          echo "dir=${GITHUB_WORKSPACE}/_a-test" >> "$GITHUB_OUTPUT"
        else
          # Local invocation: the calling workflow's own `actions/checkout`
          # step already placed the exact revision under test (this IS the
          # a-test repo -- a_test/pyproject.toml live at the workspace root)
          # -- reuse it directly instead of re-fetching a second,
          # potentially-stale copy of the remote default branch.
          echo "mode=local" >> "$GITHUB_OUTPUT"
          echo "dir=${GITHUB_WORKSPACE}" >> "$GITHUB_OUTPUT"
        fi
        echo "repository=${ACTION_REPOSITORY:-dzianisv/a-test}" >> "$GITHUB_OUTPUT"
        echo "ref=${ACTION_REF:-main}" >> "$GITHUB_OUTPUT"

    - name: Checkout a-test Python source (remote consumers only)
      if: steps.source.outputs.mode == 'remote'
      uses: actions/checkout@v4
      with:
        repository: ${{ steps.source.outputs.repository }}
        ref: ${{ steps.source.outputs.ref }}
        path: _a-test
        sparse-checkout: |
          a_test
          pyproject.toml
          README.md
          LICENSE

    - name: Install a-test
      shell: bash
      env:
        A_TEST_PY_DIR: ${{ steps.source.outputs.dir }}
      run: pip install "$A_TEST_PY_DIR"

    - name: Install ffmpeg
      shell: bash
      run: sudo apt-get install -y ffmpeg

    - name: Enable KVM
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run CUA test on Android emulator
      uses: reactivecircus/android-emulator-runner@v2
      env:
        AZURE_CUA_MODEL: ${{ inputs.model }}
      with:
        api-level: ${{ inputs.api-level }}
        arch: x86_64
        profile: ${{ inputs.profile }}
        emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
        disable-animations: true
        script: |
          if [ -n "${{ inputs.apk-path }}" ]; then
            adb install -r "${{ inputs.apk-path }}"
          fi
          a-test run --target android --case ${{ inputs.case }} --output-dir ${{ inputs.output-dir }}
