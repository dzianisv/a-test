name: CUA Chrome-Sync Login (H Company Holo)

# Same test as cua-chrome-sync-login.yml (examples/dual-surface/chrome-sync-login.ts),
# but backed by H Company's Holo Models API (https://hub.hcompany.ai) instead of
# Azure/OpenAI for the final vision-judge call. Manual + scheduled only (not on
# every push/PR) since it depends on the HAI_API_KEY repo secret, which may not
# be configured on every fork, and exercises H Company's hosted free tier.
#
# Delegates the install/Xvfb/run steps to the reusable
# .github/actions/a-test-desktop composite action (same action used by
# cua-chrome-sync-login.yml and cua-dual-surface.yml) instead of duplicating
# them inline — only the HAI_API_KEY verification step and env wiring are
# specific to this workflow.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *' # daily smoke test of the H Company Holo backend

permissions:
  contents: read

jobs:
  cua-chrome-sync-login-hcompany:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Verify HAI_API_KEY secret is configured
        env:
          HAI_API_KEY: ${{ secrets.HAI_API_KEY }}
        run: |
          if [ -z "$HAI_API_KEY" ]; then
            echo "::error::HAI_API_KEY repository secret is not set. Create a key at https://portal.hcompany.ai and add it as a repo secret named HAI_API_KEY (see docs/ci.md)."
            exit 1
          fi

      - name: Run chrome-sync login (terminal + browser) example against H Company Holo
        uses: ./.github/actions/a-test-desktop
        with:
          case: examples/dual-surface/chrome-sync-login.ts
          output-dir: /tmp/chrome-sync-login-hcompany-output
          # Explicit Holo free-tier model — the action's `model` input
          # defaults to an Azure deployment name (gpt-5.4) and is always
          # passed through as CUA_MODEL, so it must be overridden here or it
          # would clobber chrome-sync-login.ts's own "holo3-1-35b-a3b" default.
          model: holo3-1-35b-a3b
        env:
          HAI_API_KEY: ${{ secrets.HAI_API_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chrome-sync-login-hcompany-output-${{ github.run_number }}
          path: /tmp/chrome-sync-login-hcompany-output/
          retention-days: 14
          if-no-files-found: warn
