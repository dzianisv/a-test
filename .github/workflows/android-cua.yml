name: Android CUA
on: [push, pull_request]

jobs:
  cua:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/a-test-android
        with:
          case: examples/android/calculator_math.py
          output-dir: /tmp/cua-output
          api-level: '28'
          # Explicit device profile: without this, avdmanager falls back to a
          # tiny implicit default screen (320x640px). On that screen the
          # calculator's digit buttons are only ~80px wide, so the CUA
          # planner's pixel-coordinate taps land right on button boundaries
          # and intermittently mis-tap the neighbor digit (e.g. tapping "3"
          # instead of "2"), causing flaky self-reported test failures.
          # `pixel_7_pro` (1440x3120, ~512dpi) overcorrected: its very high
          # density/tall aspect ratio made the vintage com.android.calculator2
          # app (bundled in the API 28 "default" system image) render its
          # result text illegibly ("garbled symbols" per agent report).
          # `pixel_4` (1080x2280, ~440dpi) is large enough for well-separated
          # touch targets while staying close to the density/aspect ratio the
          # legacy calculator app actually renders correctly.
          profile: pixel_4
        env:
          AZURE_CUA_API_KEY: ${{ secrets.AZURE_CUA_API_KEY }}
          AZURE_CUA_BASE_URL: ${{ secrets.AZURE_CUA_BASE_URL }}
          # Enables Holo grounding (a_test/grounding.py) so tap targets are
          # resolved from the live screenshot instead of the planner LLM
          # guessing raw pixel coordinates -- fixes flaky adjacent-button
          # mis-taps (e.g. tapping "3" instead of "2"). No-op if unset.
          HAI_API_KEY: ${{ secrets.HAI_API_KEY }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cua-output-${{ github.run_number }}
          path: /tmp/cua-output/
          retention-days: 14
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cua-output-demo-${{ github.run_number }}
          path: |
            /tmp/cua-output/demo.gif
            /tmp/cua-output/*.mp4
          retention-days: 30
          if-no-files-found: warn
