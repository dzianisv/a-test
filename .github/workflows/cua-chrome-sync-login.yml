name: CUA Chrome-Sync Login (Terminal + Browser)

on: [push, pull_request]

jobs:
  cua-chrome-sync-login:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run chrome-sync login (terminal + browser) example
        uses: ./.github/actions/agentprobe-desktop
        with:
          case: examples/dual-surface/chrome-sync-login.ts
          output-dir: /tmp/chrome-sync-login-output
          model: gpt-5.4
        env:
          AZURE_CUA_API_KEY: ${{ secrets.AZURE_CUA_API_KEY }}
          AZURE_CUA_BASE_URL: ${{ secrets.AZURE_CUA_BASE_URL }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: chrome-sync-login-output-${{ github.run_number }}
          path: /tmp/chrome-sync-login-output/
          retention-days: 14
          if-no-files-found: warn
