name: Browser CUA

on: [push, pull_request]

permissions:
  contents: read

jobs:
  browser-cua:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/a-test-browser
        with:
          case: examples/open-weather.yaml
          output-dir: /tmp/browser-cua-output
        env:
          AZURE_CUA_API_KEY: ${{ secrets.AZURE_CUA_API_KEY }}
          AZURE_CUA_BASE_URL: ${{ secrets.AZURE_CUA_BASE_URL }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-cua-output-${{ github.run_number }}
          path: /tmp/browser-cua-output/
          retention-days: 14
          if-no-files-found: warn

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: browser-cua-output-demo-${{ github.run_number }}
          path: |
            /tmp/browser-cua-output/demo.gif
            /tmp/browser-cua-output/recording.mp4
          retention-days: 30
          if-no-files-found: warn
