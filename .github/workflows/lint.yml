name: Lint
on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pyflakes
      - run: python -m pyflakes a_test/
      - run: python -c "import ast, pathlib; [ast.parse(f.read_text()) for f in pathlib.Path('a_test').rglob('*.py')]"

  packaging-smoke:
    name: Packaging smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: python -m pip install --upgrade build twine
      - name: Build distributions
        run: python -m build
      - name: Validate distributions
        run: python -m twine check --strict dist/*
      - name: Smoke-test wheel
        run: |
          python -m venv /home/runner/work/_temp/a-test-wheel-venv
          /home/runner/work/_temp/a-test-wheel-venv/bin/python -m pip install dist/*.whl
          /home/runner/work/_temp/a-test-wheel-venv/bin/a-test --help

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e '.[gif-captions]' pytest
      - run: python -m pytest tests/ -q
