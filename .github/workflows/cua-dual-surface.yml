name: CUA Dual Surface (Terminal + Browser)

on: [push, pull_request]

jobs:
  cua-dual-surface:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Run dual-surface (terminal + browser) example
        uses: ./.github/actions/a-test
        with:
          script: examples/dual-surface/terminal-and-browser.ts
          environment: desktop
          output-dir: /tmp/dual-surface-output
          model: gpt-5.4
        env:
          AZURE_CUA_API_KEY: ${{ secrets.AZURE_CUA_API_KEY }}
          AZURE_CUA_BASE_URL: ${{ secrets.AZURE_CUA_BASE_URL }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dual-surface-output-${{ github.run_number }}
          path: /tmp/dual-surface-output/
          retention-days: 14
          if-no-files-found: warn
